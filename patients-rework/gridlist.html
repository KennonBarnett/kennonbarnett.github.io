<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table with Modal Viewer</title>
    <script src="./gridlist.js"></script>
    <link rel="stylesheet" href="./gridlist.css">
</head>

<body>
  <h1>Patients Directory</h1>

  <h3>Search Filters</h3>
  <div style="display: flex; flex-direction: row; gap: 20px; margin-bottom: 20px;">
    <div style="display: flex; flex-direction: column;">
      <div>Patient Name</div>
      <input type="text" id="patientNameFilter" onkeyup="applyFilters()">
    </div>
    <div style="display: flex; flex-direction: column;">
      <div>Patient ID</div>
      <input type="text" id="patientIDFilter" onkeyup="applyFilters()">
    </div>
    <div style="display: flex; flex-direction: column;">
      <div>Date of Birth</div>
      <input type="text" id="dobFilter" onkeyup="applyFilters()">
    </div>
    <div style="display: flex; flex-direction: column;">
      <div>Primary Insurance</div>
      <input type="text" id="primaryInsuranceFilter" onkeyup="applyFilters()">
    </div>
    <div style="display: flex; flex-direction: column;">
      <div>Secondary Insurance</div>
      <input type="text" id="secondaryInsuranceFilter" onkeyup="applyFilters()">
    </div>
    <div style="display: flex; flex-direction: column;">
      <div>Active Treatment Programs</div>
      <input type="text" id="activeProgramsFilter" onkeyup="applyFilters()">
    </div>
    <button onclick="resetFilters()" style="padding: 5px;">Reset Filters</button>
  </div>

  <div style="margin-bottom: 20px;">
    <b>View</b>
    <select id="savedViewsDropdown" onchange="loadSavedView()">
      <option value="">Default</option>
      <option value="">Add a new Saved View</option>
    </select>
  </div>
  <h3>Results</h3>
  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Patient Name</th>
          <th>Patient ID</th>
          <th>Date of Birth</th>
          <th>Primary Insurance</th>
          <th>Secondary Insurance</th>
          <th>Active Treatment Programs</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-nav">
        <button class="nav-btn active" id="prevBtn" onclick="">
          Charity Care
        </button>
        <button class="nav-btn" id="nextBtn" onclick="">
          Specialty Pharmacy
        </button>
        <button class="nav-btn" id="nextBtn" onclick="">
          Patient Name Specific
        </button>
        <button class="nav-btn" id="nextBtn" onclick="">
          Prior Authorization
        </button>
        <button class="nav-btn" id="nextBtn" onclick="">
          Benefits Investigation
        </button>
      </div>

      <div class="modal-body" id="modalBody"></div>

      <div class="modal-footer">
        <button class="close-btn close" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
  <script src="https://kit.fontawesome.com/46a1e8f1c6.js" crossorigin="anonymous"></script>
</body>

</html>
